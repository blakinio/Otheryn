name: OAM-041 Spawns Proof

on:
  pull_request:
    paths:
      - ".github/workflows/oam-041-spawns-proof.yml"
      - "docs/agents/tasks/active/OTH-20260724-oam041-spawns-reuse.md"
      - "docs/oam-041-spawns-reuse.md"
      - "tests/unit/game/oam_041_spawns_reuse_test.cpp"
      - "tests/unit/game/CMakeLists.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: Run deterministic OAM-041 target proof
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CANARY_TOOLS_COMMIT: d1ad83056ec7930f067986909f66b8f20f1a1f44
      TARGET_HEAD: ${{ github.event.pull_request.head.sha }}
      MAP_SHA256: a80de1dda6a9aca3956a9d5b7fb2e0caebb451570d26853fc21beb40d5f31da2
      PROOF_FROM: 32824,31275,7
      PROOF_TO: 32873,31324,7
      PROOF_ORIGIN: 32849,31300,7
    steps:
      - name: Checkout exact Otheryn PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: target

      - name: Checkout pinned Canary evidence tooling
        uses: actions/checkout@v4
        with:
          repository: blakinio/canary
          ref: d1ad83056ec7930f067986909f66b8f20f1a1f44
          path: canary-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify target selection and pinned tool provenance
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C target rev-parse HEAD)" = "$TARGET_HEAD"
          test "$(git -C canary-tools rev-parse HEAD)" = "$CANARY_TOOLS_COMMIT"
          test "$(git -C canary-tools hash-object tools/ai-agent/otbm_spawn_npc.py)" = "4339e94f5875f4d7fd443c2359c15d10f205004f"
          test "$(git -C canary-tools hash-object tools/ai-agent/otbm_spawn_npc_validation.py)" = "7f66f74b68b66e9acabe1ea1a5cbd404b1637e9b"
          test "$(git -C canary-tools hash-object tools/ai-agent/otbm_spawn_npc_tool.py)" = "481c163d8048298900b33648b08b1fac5b60fefe"
          python - <<'PY'
          from pathlib import Path
          text = Path("target/config.lua.dist").read_text(encoding="utf-8")
          assert 'dataPackDirectory = "data-otservbr-global"' in text
          assert 'mapDownloadUrl = "https://github.com/opentibiabr/canary/releases/download/v3.6.1/otservbr.otbm"' in text
          assert 'mapName = "otservbr"' in text
          PY

      - name: Compile pinned native OTBM scanner
        run: |
          c++ -O2 -std=c++20 -Wall -Wextra -Wpedantic -Werror \
            canary-tools/tools/ai-agent/otbm_item_audit_scan.cpp \
            -o /tmp/otbm_item_audit_scan

      - name: Download and verify exact configured world map
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            --output /tmp/otservbr.otbm \
            https://github.com/opentibiabr/canary/releases/download/v3.6.1/otservbr.otbm
          echo "$MAP_SHA256  /tmp/otservbr.otbm" | sha256sum --check --strict

      - name: Build deterministic World Index
        env:
          PYTHONPATH: canary-tools/tools/ai-agent
        run: |
          mkdir -p artifacts
          python canary-tools/tools/ai-agent/otbm_world_index_tool.py build \
            /tmp/otservbr.otbm \
            --scanner /tmp/otbm_item_audit_scan \
            --output /tmp/world.widx \
            --manifest artifacts/world.widx.json

      - name: Scan exact active Otheryn datapack
        env:
          PYTHONPATH: canary-tools/tools/ai-agent
        run: |
          python canary-tools/tools/ai-agent/otbm_spawn_npc_tool.py scan \
            --datapack-root target/data-otservbr-global \
            --monster-spawn world/otservbr-monster.xml \
            --npc-spawn world/otservbr-npc.xml \
            --monster-definition-glob 'monster/**/*.lua' \
            --npc-definition-glob 'npc/**/*.lua' \
            --dynamic-glob 'scripts/**/*.lua' \
            --sample-limit 1000 \
            --output artifacts/OTBM_SPAWN_NPC_EVIDENCE.json

      - name: Generate bounded reachability evidence
        env:
          PYTHONPATH: canary-tools/tools/ai-agent
        run: |
          python canary-tools/tools/ai-agent/otbm_reachability_tool.py analyze \
            /tmp/world.widx \
            --world-manifest artifacts/world.widx.json \
            --appearances target/data/items/appearances.dat \
            --from "$PROOF_FROM" \
            --to "$PROOF_TO" \
            --origin "$PROOF_ORIGIN" \
            --sample-limit 10000 \
            --output artifacts/OTBM_REACHABILITY.json \
            --fail-on none

      - name: Correlate spawn placements with map and reachability
        env:
          PYTHONPATH: canary-tools/tools/ai-agent
        run: |
          python canary-tools/tools/ai-agent/otbm_spawn_npc_tool.py validate \
            artifacts/OTBM_SPAWN_NPC_EVIDENCE.json \
            --world-index /tmp/world.widx \
            --reachability artifacts/OTBM_REACHABILITY.json \
            --from "$PROOF_FROM" \
            --to "$PROOF_TO" \
            --sample-limit 1000 \
            --output artifacts/OTBM_SPAWN_NPC_VALIDATION.json

      - name: Assemble compact proof provenance
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifacts = Path("artifacts")
          evidence = json.loads((artifacts / "OTBM_SPAWN_NPC_EVIDENCE.json").read_text(encoding="utf-8"))
          reachability = json.loads((artifacts / "OTBM_REACHABILITY.json").read_text(encoding="utf-8"))
          validation = json.loads((artifacts / "OTBM_SPAWN_NPC_VALIDATION.json").read_text(encoding="utf-8"))
          world = json.loads((artifacts / "world.widx.json").read_text(encoding="utf-8"))

          def sha256(path: str) -> str:
              h = hashlib.sha256()
              with open(path, "rb") as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          proof = {
              "format": "otheryn-oam-041-spawns-proof-v1",
              "targetHead": os.environ["TARGET_HEAD"],
              "canaryToolsCommit": os.environ["CANARY_TOOLS_COMMIT"],
              "toolBlobSha": {
                  "otbm_spawn_npc.py": "4339e94f5875f4d7fd443c2359c15d10f205004f",
                  "otbm_spawn_npc_validation.py": "7f66f74b68b66e9acabe1ea1a5cbd404b1637e9b",
                  "otbm_spawn_npc_tool.py": "481c163d8048298900b33648b08b1fac5b60fefe",
              },
              "activeDatapack": "data-otservbr-global",
              "monsterSpawn": "world/otservbr-monster.xml",
              "npcSpawn": "world/otservbr-npc.xml",
              "map": {
                  "url": "https://github.com/opentibiabr/canary/releases/download/v3.6.1/otservbr.otbm",
                  "sha256": sha256("/tmp/otservbr.otbm"),
              },
              "appearancesSha256": sha256("target/data/items/appearances.dat"),
              "region": {
                  "from": os.environ["PROOF_FROM"],
                  "to": os.environ["PROOF_TO"],
                  "origin": os.environ["PROOF_ORIGIN"],
              },
              "worldIndexManifest": world,
              "sourceSummary": evidence["summary"],
              "reachabilitySummary": reachability["summary"],
              "validationSummary": validation["summary"],
              "artifactSha256": {
                  "sourceEvidence": sha256("artifacts/OTBM_SPAWN_NPC_EVIDENCE.json"),
                  "reachability": sha256("artifacts/OTBM_REACHABILITY.json"),
                  "validation": sha256("artifacts/OTBM_SPAWN_NPC_VALIDATION.json"),
                  "worldIndexManifest": sha256("artifacts/world.widx.json"),
              },
          }
          assert evidence["format"] == "canary-otbm-spawn-npc-evidence-v1"
          assert reachability["format"] == "canary-otbm-reachability-v1"
          assert validation["format"] == "canary-otbm-spawn-npc-validation-v1"
          assert evidence["summary"]["placements"] > 0
          assert validation["summary"]["placements"] > 0
          (artifacts / "OAM_041_PROOF_SUMMARY.json").write_text(
              json.dumps(proof, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload deterministic proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oam-041-spawns-proof
          path: |
            artifacts/OAM_041_PROOF_SUMMARY.json
            artifacts/OTBM_SPAWN_NPC_EVIDENCE.json
            artifacts/OTBM_REACHABILITY.json
            artifacts/OTBM_SPAWN_NPC_VALIDATION.json
            artifacts/world.widx.json
          if-no-files-found: error
          retention-days: 14

      - name: Require complete bounded correlation
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          reachability = json.loads(Path("artifacts/OTBM_REACHABILITY.json").read_text(encoding="utf-8"))
          validation = json.loads(Path("artifacts/OTBM_SPAWN_NPC_VALIDATION.json").read_text(encoding="utf-8"))
          assert reachability["summary"]["findings"]["truncated"] is False
          assert "reachability_diagnostics_truncated" not in validation["summary"]["findings"]["byCode"]
          PY
