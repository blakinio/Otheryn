name: OAM-043 Quest Evidence

on:
  push:
    branches:
      - dudantas/oam-043-quests-target-proof
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Otheryn target
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: target

      - name: Checkout current upstream Canary
        uses: actions/checkout@v4
        with:
          repository: opentibiabr/canary
          ref: 7323503b3dc61ed86bf1f04a611b2d0aec64b35a
          path: upstream

      - name: Checkout legacy Canary evidence tooling
        uses: actions/checkout@v4
        with:
          repository: blakinio/canary
          ref: 13ec3077babba0ac81bb1e30e79f0ea4827ae2fe
          path: legacy

      - name: Build exact three-way quest manifest
        shell: python
        run: |
          import hashlib
          import json
          import os
          import subprocess
          from collections import Counter
          from pathlib import Path

          roots = (
              "data-otservbr-global/scripts/quests",
              "data/scripts/quests",
          )
          repos = {
              "target": Path("target"),
              "upstream": Path("upstream"),
              "legacy": Path("legacy"),
          }

          def revision(repo: Path):
              return subprocess.check_output(
                  ["git", "-C", str(repo), "rev-parse", "HEAD"], text=True
              ).strip()

          def inventory(repo: Path):
              result = {}
              for root in roots:
                  base = repo / root
                  if not base.exists():
                      continue
                  for path in sorted(base.rglob("*")):
                      if not path.is_file():
                          continue
                      relative = path.relative_to(repo).as_posix()
                      result[relative] = hashlib.sha256(path.read_bytes()).hexdigest()
              return result

          inventories = {name: inventory(path) for name, path in repos.items()}
          all_paths = sorted(set().union(*(set(items) for items in inventories.values())))

          def classify(values):
              present = {name: digest for name, digest in values.items() if digest is not None}
              missing = sorted(set(values) - set(present))
              if len(present) == 1:
                  return f"{next(iter(present))}-only"
              if missing:
                  return "missing-" + "-".join(missing)
              unique = set(present.values())
              if len(unique) == 1:
                  return "all-identical"
              if present["target"] == present["upstream"]:
                  return "target-upstream-identical-legacy-divergent"
              if present["target"] == present["legacy"]:
                  return "target-legacy-identical-upstream-divergent"
              if present["upstream"] == present["legacy"]:
                  return "upstream-legacy-identical-target-divergent"
              return "all-divergent"

          entries = []
          classes = Counter()
          for path in all_paths:
              values = {name: inventories[name].get(path) for name in repos}
              classification = classify(values)
              classes[classification] += 1
              entries.append({"path": path, "classification": classification, **values})

          manifest_payload = {
              "schema": "oam-043-quest-inventory-v1",
              "baselines": {name: revision(path) for name, path in repos.items()},
              "roots": roots,
              "counts": {name: len(items) for name, items in inventories.items()},
              "classifications": dict(sorted(classes.items())),
              "entries": entries,
          }
          canonical = json.dumps(manifest_payload, sort_keys=True, separators=(",", ":")).encode()
          manifest_payload["manifest_sha256"] = hashlib.sha256(canonical).hexdigest()

          Path("oam-043-quest-inventory.json").write_text(
              json.dumps(manifest_payload, indent=2, sort_keys=True) + "\n"
          )

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a") as handle:
              handle.write("# OAM-043 exact quest inventory\n\n")
              handle.write(f"Manifest SHA-256: `{manifest_payload['manifest_sha256']}`\n\n")
              handle.write("## Baselines\n\n")
              for name, sha in manifest_payload["baselines"].items():
                  handle.write(f"- {name}: `{sha}`\n")
              handle.write("\n## File counts\n\n")
              for name, count in manifest_payload["counts"].items():
                  handle.write(f"- {name}: {count}\n")
              handle.write("\n## Classifications\n\n")
              for name, count in manifest_payload["classifications"].items():
                  handle.write(f"- {name}: {count}\n")

          print(json.dumps({
              "baselines": manifest_payload["baselines"],
              "counts": manifest_payload["counts"],
              "classifications": manifest_payload["classifications"],
              "manifest_sha256": manifest_payload["manifest_sha256"],
          }, sort_keys=True))

      - name: Scan complete target quest source evidence
        env:
          PYTHONPATH: legacy/tools/ai-agent
        run: |
          python legacy/tools/ai-agent/quest_map_validation_tool.py scan \
            --repository-root target \
            --source-root data \
            --source-root data-otservbr-global \
            --include 'data-otservbr-global/scripts/quests/*.lua' \
            --include 'data-otservbr-global/scripts/quests/**/*.lua' \
            --include 'data/scripts/quests/*.lua' \
            --include 'data/scripts/quests/**/*.lua' \
            --output oam-043-quest-source-evidence.json

      - name: Summarize quest source evidence
        shell: python
        run: |
          import json
          import os
          from collections import Counter
          from pathlib import Path

          evidence = json.loads(Path("oam-043-quest-source-evidence.json").read_text())
          unresolved_by_kind = Counter(item.get("kind", "unknown") for item in evidence["unresolved"])
          unresolved_by_reason = Counter(item.get("reason", "unknown") for item in evidence["unresolved"])
          compact = {
              "format": evidence["format"],
              "sourceDigest": evidence["sourceDigest"],
              "summary": evidence["summary"],
              "unresolvedByKind": dict(sorted(unresolved_by_kind.items())),
              "unresolvedByReason": dict(sorted(unresolved_by_reason.items())),
          }
          Path("oam-043-quest-source-summary.json").write_text(
              json.dumps(compact, indent=2, sort_keys=True) + "\n"
          )
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a") as handle:
              handle.write("\n# OAM-043 complete source scan\n\n")
              handle.write(f"Source digest: `{compact['sourceDigest']}`\n\n")
              for key, value in compact["summary"].items():
                  handle.write(f"- {key}: `{json.dumps(value, sort_keys=True)}`\n")
              handle.write("\n## Unresolved by kind\n\n")
              for key, value in compact["unresolvedByKind"].items():
                  handle.write(f"- {key}: {value}\n")
          print(json.dumps(compact, sort_keys=True))

      - name: Upload exact OAM-043 evidence
        uses: actions/upload-artifact@v4
        with:
          name: oam-043-quest-evidence
          path: |
            oam-043-quest-inventory.json
            oam-043-quest-source-evidence.json
            oam-043-quest-source-summary.json
          if-no-files-found: error
