name: OAM-004B Migration Contract Audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "data-otservbr-global/migrations/**"
      - "src/database/databasemanager.cpp"
      - "src/database/databasemanager.hpp"
      - "docs/architecture/oam-004b-fail-closed-database-migrations.md"
      - ".github/workflows/oam-004b-migration-contract-audit.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Audit shipped migration return conventions
        shell: bash
        run: |
          set -euo pipefail
          migration_dir="data-otservbr-global/migrations"
          echo "MIGRATION_DIR=${migration_dir}"
          mapfile -t files < <(find "${migration_dir}" -maxdepth 1 -type f -name '*.lua' | sort -V)
          echo "MIGRATION_COUNT=${#files[@]}"
          for file in "${files[@]}"; do
            echo "--- ${file}"
            grep -nE '(^|[^[:alnum:]_])return([[:space:]]|$)' "${file}" || echo "NO_EXPLICIT_RETURN"
          done
