name: OAM-043 Target Symbol Search

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Locate prerequisite runtime symbols
        shell: python
        run: |
          import json
          from pathlib import Path

          needles = (
              "hasAccountQuestAccess",
              "unlockAccountQuestAccess",
              "countMonsters",
              "The Professor's Nut",
              "The Professors Nut",
          )
          extensions = {".lua", ".cpp", ".hpp", ".h"}
          matches = {needle: [] for needle in needles}
          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix not in extensions or ".git" in path.parts:
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              for needle in needles:
                  for number, line in enumerate(lines, 1):
                      if needle in line:
                          matches[needle].append({
                              "path": path.as_posix(),
                              "line": number,
                              "context": line.strip()[:500],
                          })
          Path("oam-043-target-symbol-search.json").write_text(
              json.dumps(matches, indent=2, sort_keys=True) + "\n"
          )
          print(json.dumps(matches, sort_keys=True))
      - uses: actions/upload-artifact@v4
        with:
          name: oam-043-target-symbol-search
          path: oam-043-target-symbol-search.json
          if-no-files-found: error
