name: OAM-012 exact donor materialization

on:
  pull_request:
    branches:
      - main
    types: [synchronize]
    paths:
      - .github/workflows/oam012-materialize-donor.yml

permissions:
  contents: write

concurrency:
  group: oam012-materialize-donor
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: fix/oam-012-achievements-reconciliation
          fetch-depth: 1
          show-progress: false

      - name: Materialize exact donor state
        shell: bash
        run: bash .github/oam012-materialize.sh
