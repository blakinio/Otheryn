name: OAM-043 Candidate Donor Map Proof

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MAP_SHA256: a80de1dda6a9aca3956a9d5b7fb2e0caebb451570d26853fc21beb40d5f31da2
    steps:
      - name: Checkout exact target head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: target
      - name: Checkout exact legacy baseline
        uses: actions/checkout@v4
        with:
          repository: blakinio/canary
          ref: 13ec3077babba0ac81bb1e30e79f0ea4827ae2fe
          path: legacy
      - name: Scan bounded candidate donor scripts
        env:
          PYTHONPATH: legacy/tools/ai-agent
        run: |
          python legacy/tools/ai-agent/quest_map_validation_tool.py scan \
            --repository-root legacy \
            --source-root data-otservbr-global \
            --include 'data-otservbr-global/scripts/quests/the_beginning/the_beginning_tutorial_moveevents.lua' \
            --include 'data-otservbr-global/scripts/quests/the_beginning/the_beginning_zirella_door.lua' \
            --include 'data-otservbr-global/scripts/quests/the_beginning/the_beginning_zirella_wood.lua' \
            --include 'data-otservbr-global/scripts/quests/the_ancient_tombs/actions_oasis_lever_door.lua' \
            --output candidate-donor-source-evidence.json
      - name: Compile OTBM scanner
        run: |
          c++ -O2 -std=c++20 -Wall -Wextra -Wpedantic -Werror \
            legacy/tools/ai-agent/otbm_item_audit_scan.cpp \
            -o /tmp/otbm_item_audit_scan
      - name: Download and verify configured map
        run: |
          curl --fail --location --retry 3 \
            --output /tmp/otservbr.otbm \
            https://github.com/opentibiabr/canary/releases/download/v3.6.1/otservbr.otbm
          echo "$MAP_SHA256  /tmp/otservbr.otbm" | sha256sum --check --strict
      - name: Build world index
        env:
          PYTHONPATH: legacy/tools/ai-agent
        run: |
          python legacy/tools/ai-agent/otbm_world_index_tool.py build \
            /tmp/otservbr.otbm \
            --scanner /tmp/otbm_item_audit_scan \
            --output /tmp/world.widx \
            --manifest candidate-donor-world-index.json
      - name: Correlate bounded candidate donor mechanics
        env:
          PYTHONPATH: legacy/tools/ai-agent
        run: |
          python legacy/tools/ai-agent/quest_map_validation_tool.py validate \
            candidate-donor-source-evidence.json \
            --world-index /tmp/world.widx \
            --sample-limit 10 \
            --output candidate-donor-map-validation.json \
            --fail-on none
      - name: Summarize candidate donor disposition evidence
        shell: python
        run: |
          import json
          from pathlib import Path
          source = json.loads(Path('candidate-donor-source-evidence.json').read_text())
          validation = json.loads(Path('candidate-donor-map-validation.json').read_text())
          aid_12108 = [
              finding for finding in validation['findings']
              if finding.get('kind') == 'actionId' and finding.get('value') == 12108
          ]
          compact = {
              'sourceDigest': source['sourceDigest'],
              'sourceSummary': source['summary'],
              'validationSummary': validation['summary'],
              'actionId12108': aid_12108,
              'findings': validation['findings'],
              'sourceUnresolved': validation['sourceUnresolved'],
          }
          assert len(aid_12108) == 1
          assert aid_12108[0]['classification'] == 'confirmed'
          Path('candidate-donor-proof-summary.json').write_text(json.dumps(compact, indent=2, sort_keys=True) + '\n')
          print(json.dumps(compact, sort_keys=True))
      - uses: actions/upload-artifact@v4
        with:
          name: oam-043-candidate-donor-map-proof
          path: |
            candidate-donor-proof-summary.json
            candidate-donor-source-evidence.json
            candidate-donor-map-validation.json
            candidate-donor-world-index.json
          if-no-files-found: error
