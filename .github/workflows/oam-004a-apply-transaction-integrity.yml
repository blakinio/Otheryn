name: OAM-004A Apply Transaction Integrity

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/oam-004a-apply-transaction-integrity.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'dudantas/oam-004a-db-transaction-integrity'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout OAM-004A branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply exact DB transaction-integrity patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'src/database/database.cpp',
              '''\t// automatic reconnect\n\tbool reconnect = true;\n\tmysql_options(handle, MYSQL_OPT_RECONNECT, &reconnect);''',
              '''\t// Oteryn persistence is fail-closed: an implicit reconnect resets server-side\n\t// session state and rolls back active transactions without notifying callers.\n\tbool reconnect = false;\n\tmysql_options(handle, MYSQL_OPT_RECONNECT, &reconnect);''',
              'disable auto reconnect',
          )

          replace_once(
              'src/database/database.cpp',
              '''bool Database::beginTransaction() {\n\tif (!executeQuery("BEGIN")) {\n\t\treturn false;\n\t}\n\tmetrics::lock_latency measureLock("database");\n\tdatabaseLock.lock();\n\tmeasureLock.stop();\n\n\treturn true;\n}''',
              '''bool Database::beginTransaction() {\n\t// Hold the connection lock before BEGIN so no other thread can execute a\n\t// statement on the shared MYSQL handle between BEGIN and transaction ownership.\n\tmetrics::lock_latency measureLock("database");\n\tdatabaseLock.lock();\n\tmeasureLock.stop();\n\n\tif (!executeQuery("BEGIN")) {\n\t\tdatabaseLock.unlock();\n\t\treturn false;\n\t}\n\n\treturn true;\n}''',
              'lock before begin',
          )

          replace_once(
              'src/database/database.cpp',
              '''bool Database::retryQuery(std::string_view query, int retries) {\n\twhile (retries > 0 && mysql_query(handle, query.data()) != 0) {\n\t\tg_logger().error("Query: {}", query.substr(0, 256));\n\t\tg_logger().error("MySQL error [{}]: {}", mysql_errno(handle), mysql_error(handle));\n\t\tif (!isRecoverableError(mysql_errno(handle))) {\n\t\t\treturn false;\n\t\t}\n\t\tstd::this_thread::sleep_for(std::chrono::seconds(1));\n\t\tretries--;\n\t}\n\tif (retries == 0) {\n\t\tg_logger().error("Query {} failed after {} retries.", query, 10);\n\t\treturn false;\n\t}\n\n\treturn true;\n}''',
              '''bool Database::retryQuery(std::string_view query, int retries) {\n\t// Compatibility wrapper for existing callers. Arbitrary SQL statements are\n\t// intentionally not resent after connection loss because their server-side\n\t// execution state may be unknown and an implicit reconnect destroys transaction state.\n\t(void)retries;\n\tif (mysql_query(handle, query.data()) != 0) {\n\t\tg_logger().error("Query: {}", query.substr(0, 256));\n\t\tg_logger().error("MySQL error [{}]: {}", mysql_errno(handle), mysql_error(handle));\n\t\treturn false;\n\t}\n\treturn true;\n}''',
              'disable arbitrary statement retry',
          )

          replace_once(
              'src/database/database.cpp',
              '''\tmetrics::query_latency measure(query.substr(0, 50));\nretry:\n\tif (mysql_query(handle, query.data()) != 0) {\n\t\tg_logger().error("Query: {}", query);\n\t\tg_logger().error("Message: {}", mysql_error(handle));\n\t\tif (!isRecoverableError(mysql_errno(handle))) {\n\t\t\treturn nullptr;\n\t\t}\n\t\tstd::this_thread::sleep_for(std::chrono::seconds(1));\n\t\tgoto retry;\n\t}''',
              '''\tmetrics::query_latency measure(query.substr(0, 50));\n\tif (mysql_query(handle, query.data()) != 0) {\n\t\tg_logger().error("Query: {}", query);\n\t\tg_logger().error("MySQL error [{}]: {}", mysql_errno(handle), mysql_error(handle));\n\t\treturn nullptr;\n\t}''',
              'disable store query retry',
          )

          replace_once(
              'src/database/database.hpp',
              '''\t\t\tconst bool result = callback();\n\n\t\t\tif (!transaction.commit()) {\n\t\t\t\treturn false;\n\t\t\t}\n\n\t\t\treturn result;''',
              '''\t\t\tif (!callback()) {\n\t\t\t\ttransaction.rollback();\n\t\t\t\treturn false;\n\t\t\t}\n\n\t\t\treturn transaction.commit();''',
              'rollback false callback',
          )

          replace_once(
              'src/database/database.hpp',
              '''\t\t\t// Start the transaction\n\t\t\tstate = STATE_START;\n\t\t\treturn Database::getInstance().beginTransaction();''',
              '''\t\t\t// Start the transaction. Keep local state aligned with the database lock\n\t\t\t// and server-side transaction only after BEGIN succeeds.\n\t\t\tstate = STATE_START;\n\t\t\tif (!Database::getInstance().beginTransaction()) {\n\t\t\t\tstate = STATE_NO_START;\n\t\t\t\treturn false;\n\t\t\t}\n\t\t\treturn true;''',
              'reset failed begin state',
          )
          PY

          git diff --check
          git diff -- src/database/database.cpp src/database/database.hpp

          git config user.name "Oteryn OAM Database"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/database/database.cpp src/database/database.hpp
          git commit -m "fix(database): fail closed on transaction connection loss"
          git push origin HEAD:dudantas/oam-004a-db-transaction-integrity
