name: OAM 027 House Materialize

on:
  push:
    branches:
      - dudantas/oam-027-houses-adapt
    paths:
      - .github/workflows/oam-027-house-materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dudantas/oam-027-houses-adapt
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact reviewed donor hunks
        run: python tools/agents/oam_027_house_materialize.py
      - name: Commit materialized house adaptation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/map/house/house.cpp
          git diff --cached --check
          git commit -m "fix(house): prevent transfer iteration duplication"
          git push origin HEAD:dudantas/oam-027-houses-adapt
