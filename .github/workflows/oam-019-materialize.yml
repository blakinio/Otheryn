name: OAM-019 materialize bounded donor adaptation

on:
  push:
    branches:
      - dudantas/oam-019-imbuements-adapt
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'dudantas/oam-019-imbuements-adapt')
    runs-on: macos-latest
    steps:
      - name: Check out exact task branch
        uses: actions/checkout@v4
        with:
          ref: dudantas/oam-019-imbuements-adapt
          fetch-depth: 0

      - name: Apply fail-closed bounded adaptation
        run: |
          python3 tools/oam_019_materialize.py
          python3 tools/oam_019_runtime_test_materialize.py

      - name: Remove temporary materializer
        run: |
          rm tools/oam_019_materialize.py
          rm tools/oam_019_runtime_test_materialize.py
          rm .github/workflows/oam-019-materialize.yml
          rm -f .oam-019-trigger

      - name: Verify intended final paths only
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git status --short
          changed="$(git diff --cached --name-only origin/main -- | sort)"
          allowed="$(cat <<'EOF' | sort
          data/XML/imbuements.xml
          src/creatures/players/imbuements/imbuement_access_policy.hpp
          src/creatures/players/imbuements/imbuement_storage_policy.hpp
          src/creatures/players/imbuements/imbuements.cpp
          src/creatures/players/player.cpp
          tests/fixture/core/XML/imbuements.xml
          tests/unit/players/imbuements/CMakeLists.txt
          tests/unit/players/imbuements/imbuement_storage_policy_test.cpp
          tests/unit/players/imbuements/oam_019_imbuements_adapt_test.cpp
          tests/unit/players/imbuements/oam_019_scroll_runtime_test.cpp
          EOF
          )"
          test "$changed" = "$allowed"

      - name: Commit materialized OAM-019 adaptation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(imbuements): adapt OAM-019 validated behavior"
          git push origin HEAD:dudantas/oam-019-imbuements-adapt
