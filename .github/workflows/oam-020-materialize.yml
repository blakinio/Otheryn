name: OAM-020 bounded materializer

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/oam_020_materialize.sh
      - .github/workflows/oam-020-materialize.yml

permissions:
  contents: write

concurrency:
  group: oam-020-exaltation-forge-materializer
  cancel-in-progress: true

jobs:
  materialize:
    if: >-
      github.repository == 'blakinio/Otheryn' &&
      github.head_ref == 'dudantas/oam-020-exaltation-forge-adapt'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact target branch
        uses: actions/checkout@v4
        with:
          ref: dudantas/oam-020-exaltation-forge-adapt
          fetch-depth: 0

      - name: Run bounded OAM-020 donor materializer
        id: materialize
        continue-on-error: true
        shell: bash
        run: |
          if [[ ! -f .github/scripts/oam_020_materialize.sh ]]; then
            echo "OAM-020 materializer already removed from current branch; nothing to do." | tee /tmp/oam-020-materializer.log
            exit 0
          fi
          set +e
          bash .github/scripts/oam_020_materialize.sh 2>&1 | tee /tmp/oam-020-materializer.log
          status=${PIPESTATUS[0]}
          set -e
          exit ${status}

      - name: Upload OAM-020 materializer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oam-020-materializer-log
          path: /tmp/oam-020-materializer.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail closed when materialization failed
        if: steps.materialize.outcome == 'failure'
        shell: bash
        run: exit 1
