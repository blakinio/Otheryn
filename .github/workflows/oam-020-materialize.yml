name: OAM-020 bounded materializer

on:
  push:
    branches:
      - dudantas/oam-020-exaltation-forge-adapt
    paths:
      - .github/scripts/oam_020_materialize.sh
      - .github/workflows/oam-020-materialize.yml

permissions:
  contents: write

concurrency:
  group: oam-020-exaltation-forge-materializer
  cancel-in-progress: true

jobs:
  materialize:
    if: >-
      github.repository == 'blakinio/Otheryn' &&
      github.ref == 'refs/heads/dudantas/oam-020-exaltation-forge-adapt'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact target branch
        uses: actions/checkout@v4
        with:
          ref: dudantas/oam-020-exaltation-forge-adapt
          fetch-depth: 0

      - name: Materialize bounded OAM-020 donor set
        shell: bash
        run: |
          if [[ ! -f .github/scripts/oam_020_materialize.sh ]]; then
            echo "OAM-020 materializer already removed from current branch; nothing to do."
            exit 0
          fi
          set +e
          bash .github/scripts/oam_020_materialize.sh 2>&1 | tee /tmp/oam-020-materializer.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ ${status} -ne 0 ]]; then
            git reset --hard HEAD
            cp /tmp/oam-020-materializer.log .github/oam-020-materializer-failure.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/oam-020-materializer-failure.log
            git commit -m "chore(oam): record OAM-020 materializer failure" || true
            git push origin HEAD:dudantas/oam-020-exaltation-forge-adapt
            exit ${status}
          fi
