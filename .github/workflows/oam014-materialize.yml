name: OAM-014 donor materialization

on:
  push:
    branches:
      - fix/oam-014-combat-conditions
    paths:
      - .github/oam014-materialize.sh

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Materialize exact reviewed boundary
        run: bash .github/oam014-materialize.sh
      - name: Commit materialized boundary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(combat): adapt OAM-014 condition light safety"
          git push origin HEAD:fix/oam-014-combat-conditions
