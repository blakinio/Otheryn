---
name: Reusable Docker Quickstart Smoke

on:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke:
    name: Quickstart Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Convert repository name to lowercase
        id: repo_lower
        run: |
          echo "value=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Download Docker image artifact
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: actions/download-artifact@v7
        with:
          name: canary-docker-image
          path: artifacts/docker-image

      - name: Run Docker quickstart smoke (PR image)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        env:
          CANARY_IMAGE: ghcr.io/${{ steps.repo_lower.outputs.value }}:pr
          CANARY_IMAGE_TAR: artifacts/docker-image/canary-pr.tar
        run: bash .github/scripts/docker-quickstart-smoke.sh

      - name: Run Docker quickstart smoke (latest image)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CANARY_IMAGE: ghcr.io/opentibiabr/canary:latest
        run: bash .github/scripts/docker-quickstart-smoke.sh
